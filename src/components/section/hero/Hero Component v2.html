<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosperify — Hero Component v2</title>
<link rel="stylesheet" href="colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { font-family: var(--font-sans); background: #fff; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
@keyframes highlightPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(254,240,138,0); }
  50% { box-shadow: 0 0 0 3px rgba(254,240,138,0.5); }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

const { useState, useEffect, useRef } = React;

/* ─── Lucide-style SVG icons ─── */
const Icon = ({ d, size = 16, stroke = 'currentColor', fill = 'none', sw = 1.5 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke}
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{typeof d === 'string' ? <path d={d}/> : d}</svg>
);
const IconMsg = (p) => <Icon {...p} d={<><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>}/>;
const IconSearch = (p) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>}/>;
const IconFilter = (p) => <Icon {...p} d={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>}/>;
const IconHistory = (p) => <Icon {...p} d={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></>}/>;
const IconSettings = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></>}/>;
const IconSend = (p) => <Icon {...p} d={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>}/>;
const IconPaperclip = (p) => <Icon {...p} d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>;
const IconFile = (p) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>}/>;
const IconZoomIn = (p) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></>}/>;
const IconZoomOut = (p) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></>}/>;
const IconRotate = (p) => <Icon {...p} d={<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>}/>;
const IconDownload = (p) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>;
const IconExtLink = (p) => <Icon {...p} d={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>}/>;

/* ─── Prosperify Logo ─── */
function ProsperifyLogo({ height = 28 }) {
  return (
    <svg height={height} viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g>
        <path d="M8 32 L8 8 L20 8 C26 8 30 12 30 18 C30 24 26 28 20 28 L14 28 L14 32 Z M14 22 L20 22 C22.5 22 24 20.5 24 18 C24 15.5 22.5 14 20 14 L14 14 Z" fill="#ff6a13"/>
        <circle cx="32" cy="10" r="2.5" fill="#ff6a13"/>
      </g>
      <text x="42" y="27" fontFamily="Inter, sans-serif" fontWeight="700" fontSize="20" fill="#141414" letterSpacing="-0.02em">Prosperify</text>
    </svg>
  );
}

/* ─── Safari Chrome ─── */
function SafariChrome({ url, children, style }) {
  return (
    <div style={{
      background: '#fff', borderRadius: 14,
      boxShadow: '0 10px 40px rgba(0,0,0,0.14), 0 0 0 1px rgba(0,0,0,0.06)',
      overflow: 'hidden', ...style,
    }}>
      <div style={{
        background: '#f5f5f5', padding: '10px 16px',
        display: 'flex', alignItems: 'center', gap: 10,
        borderBottom: '1px solid #e5e7eb',
      }}>
        <div style={{ display: 'flex', gap: 7 }}>
          {['#ff5f57','#febc2e','#28c840'].map(c => (
            <span key={c} style={{ width: 12, height: 12, borderRadius: 99, background: c }}/>
          ))}
        </div>
        <div style={{
          flex: 1, background: '#fff', borderRadius: 7, padding: '6px 14px',
          fontSize: 12.5, color: '#6b7280', textAlign: 'center',
          fontFamily: 'JetBrains Mono, monospace', border: '1px solid #e5e7eb',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
        }}>
          <svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M5 0a3 3 0 0 0-3 3v2H1a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H8V3a3 3 0 0 0-3-3zm1.5 5h-3V3a1.5 1.5 0 1 1 3 0v2z" fill="#22c55e"/></svg>
          {url}
        </div>
      </div>
      <div>{children}</div>
    </div>
  );
}

/* ─── Animated message ─── */
function Msg({ children, align, delay, bg, color, border, maxWidth, started }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    if (!started) return;
    const t = setTimeout(() => setShow(true), delay);
    return () => clearTimeout(t);
  }, [started, delay]);
  return (
    <div style={{
      display: 'flex', justifyContent: align === 'right' ? 'flex-end' : 'flex-start',
      opacity: show ? 1 : 0, transform: show ? 'translateY(0)' : 'translateY(14px)',
      transition: 'all 0.5s cubic-bezier(0.25,0.46,0.45,0.94)',
    }}>
      <div style={{
        background: bg || '#f3f4f6', color: color || '#374151',
        borderRadius: 12, padding: '13px 17px', fontSize: 13.5, lineHeight: 1.6,
        maxWidth: maxWidth || 340, border: border || '1px solid #e5e7eb',
      }}>{children}</div>
    </div>
  );
}

/* ─── Typing dots ─── */
function Dots({ started, delay }) {
  const [show, setShow] = useState(false);
  const [hide, setHide] = useState(false);
  useEffect(() => {
    if (!started) return;
    const t1 = setTimeout(() => setShow(true), delay);
    const t2 = setTimeout(() => setHide(true), delay + 1500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [started, delay]);
  if (!show || hide) return null;
  return (
    <div style={{ display:'flex', gap:5, padding:'11px 15px', background:'#f3f4f6',
      borderRadius:12, width:'fit-content', border:'1px solid #e5e7eb' }}>
      {[0,1,2].map(i => <span key={i} style={{ width:7, height:7, borderRadius:99,
        background:'#9ca3af', animation:`dotPulse 1s ${i*0.15}s infinite` }}/>)}
    </div>
  );
}

/* ─── Sidebar ─── */
function Sidebar() {
  const navItems = [
    { icon: <IconMsg size={15}/>, label: 'Nouvelle conversation' },
    { icon: <IconSearch size={15}/>, label: 'Rechercher' },
    { icon: <IconFilter size={15}/>, label: 'Filtres' },
    { icon: <IconHistory size={15}/>, label: 'Historique' },
    { icon: <IconSettings size={15}/>, label: 'Paramètres' },
  ];
  const convos = [
    { label: 'contrat verdi', active: true },
    { label: 'Budget Q4' },
    { label: 'Procédures RH' },
    { label: 'Rapport mensuel' },
  ];
  return (
    <div style={{
      width: 230, background: '#fafafa', borderRight: '1px solid #e5e7eb',
      display: 'flex', flexDirection: 'column', flexShrink: 0,
    }}>
      <div style={{ padding: '18px 16px 14px', borderBottom: '1px solid #e5e7eb' }}>
        <ProsperifyLogo height={22}/>
      </div>
      <div style={{ padding: '14px 12px 0', display: 'flex', flexDirection: 'column', gap: 4 }}>
        {navItems.map((n,i) => (
          <div key={i} style={{
            display:'flex', alignItems:'center', gap:9, padding:'9px 12px',
            borderRadius:8, fontSize:12, color:'#374151', cursor:'pointer',
          }}>
            <span style={{ color:'#6b7280' }}>{n.icon}</span>{n.label}
          </div>
        ))}
      </div>
      <div style={{ padding:'16px 12px 0' }}>
        <div style={{ fontSize:10, fontWeight:600, color:'#9ca3af', letterSpacing:'0.06em',
          textTransform:'uppercase', padding:'0 12px', marginBottom:10 }}>Conversations</div>
        <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
          {convos.map((c,i) => (
            <div key={i} style={{
              padding:'8px 12px', borderRadius:8, fontSize:12.5,
              background: c.active ? '#e5e7eb' : 'transparent',
              color: c.active ? '#141414' : '#6b7280', fontWeight: c.active ? 500 : 400,
            }}>{c.label}</div>
          ))}
        </div>
      </div>
      <div style={{ marginTop:'auto', padding:16, borderTop:'1px solid #e5e7eb' }}>
        <div style={{
          fontSize:10, color:'#16a34a', background:'#dcfce7', padding:'3px 8px',
          borderRadius:4, fontWeight:600, width:'fit-content', marginBottom:6,
        }}>Connecté en tant que</div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{
            width:26, height:26, borderRadius:6, background:'#f3e8ff',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:10, fontWeight:600, color:'#9333ea',
          }}>ED</div>
          <div>
            <div style={{ fontSize:12, fontWeight:500, color:'#141414' }}>Eric Dupont</div>
            <div style={{ fontSize:10, color:'#6b7280' }}>Contrôleur Financier</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── PDF Viewer Panel ─── */
function PdfViewer() {
  return (
    <div style={{
      width: 380, borderLeft:'1px solid #e5e7eb', background:'#fff',
      display:'flex', flexDirection:'column', flexShrink:0,
    }}>
      {/* Tab bar */}
      <div style={{ padding:'14px 16px', borderBottom:'1px solid #e5e7eb' }}>
        <div style={{ display:'flex', gap:8, marginBottom:12, flexWrap:'wrap' }}>
          <span style={{
            fontSize:12, padding:'6px 12px', borderRadius:7,
            border:'1px solid #fed7aa', color:'#ea580c', background:'#fff7ed',
            display:'flex', alignItems:'center', gap:6, fontWeight:500,
          }}>
            <IconFile size={12} stroke="#ea580c"/>Contrat_Verdi.pdf
          </span>
          <span style={{
            fontSize:12, padding:'6px 12px', borderRadius:7,
            border:'1px solid #bfdbfe', color:'#2563eb', background:'#eff6ff',
            display:'flex', alignItems:'center', gap:6, fontWeight:500,
          }}>
            <IconFile size={12} stroke="#2563eb"/>Rapport_Financier_Q4…
          </span>
        </div>
        {/* Toolbar */}
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          {[IconSearch, IconZoomIn, IconZoomOut, IconRotate, IconDownload].map((Ic,i) => (
            <div key={i} style={{
              width:30, height:30, borderRadius:7, border:'1px solid #e5e7eb',
              display:'flex', alignItems:'center', justifyContent:'center',
              background:'#fff', color:'#6b7280', cursor:'pointer',
            }}><Ic size={13}/></div>
          ))}
          <span style={{ fontSize:11, color:'#6b7280', margin:'0 4px', fontFamily:'JetBrains Mono, monospace' }}>100%</span>
          <div style={{ marginLeft:'auto' }}>
            <div style={{
              padding:'5px 10px', borderRadius:6, border:'1px solid #e5e7eb',
              fontSize:11, color:'#9ca3af', background:'#fff',
            }}>Rechercher…</div>
          </div>
        </div>
      </div>

      {/* PDF Content */}
      <div style={{ flex:1, padding:16, background:'#f9fafb', overflow:'hidden' }}>
        <div style={{
          background:'#fff', borderRadius:10, border:'1px solid #e5e7eb',
          padding:20, height:'100%', overflow:'hidden',
        }}>
          <div style={{ textAlign:'center', marginBottom:16 }}>
            <h3 style={{ fontWeight:700, fontSize:15, color:'#141414' }}>Contrat Verdi.pdf</h3>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'#9ca3af', marginTop:6 }}>
              <span>Précédent</span><span>Page 1 sur 15</span><span>Suivant</span>
            </div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <div>
              <p style={{ fontWeight:700, fontSize:13, color:'#141414', marginBottom:6 }}>ARTICLE 1 – OBJET DU CONTRAT :</p>
              <p style={{ fontSize:12, color:'#6b7280', lineHeight:1.65 }}>
                Le présent Contrat a pour objet d'organiser la collaboration entre VERDI et le PARTENAIRE, incluant la définition de périmètre de recherche, la mise en commun de moyens matériels et humains, la production de rapports, ainsi que la valorisation des résultats obtenus.
              </p>
            </div>
            <div>
              <p style={{ fontWeight:700, fontSize:13, color:'#141414', marginBottom:6 }}>ARTICLE 2 – DURÉE :</p>
              <p style={{ fontSize:12, color:'#6b7280', lineHeight:1.65 }}>
                Le présent Contrat entre en vigueur à la date de signature pour une durée initiale de{' '}
                <span style={{ background:'#fef08a', padding:'1px 4px', borderRadius:3, animation:'highlightPulse 2s ease-in-out infinite' }}>trois (3) ans</span>.{' '}
                <span style={{ background:'#bbf7d0', padding:'1px 4px', borderRadius:3 }}>
                  Il pourra être renouvelé par accord exprès et écrit des Parties. En cas de non-renouvellement, les obligations relatives à la confidentialité et à la propriété intellectuelle resteront en vigueur.
                </span>{' '}
                Cette disposition constitue une garantie de continuité, même au terme de la collaboration.
              </p>
            </div>
            <div>
              <p style={{ fontWeight:700, fontSize:13, color:'#141414', marginBottom:6 }}>ARTICLE 3 – DÉFINITIONS :</p>
              <p style={{ fontSize:12, color:'#6b7280', lineHeight:1.65 }}>
                « Résultats » désigne toute donnée, méthode, prototype, logiciel, rapport ou publication générée.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Chat Panel ─── */
function ChatPanel({ started }) {
  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
      {/* Header */}
      <div style={{
        padding:'16px 24px', borderBottom:'1px solid #e5e7eb', background:'#fff',
        display:'flex', alignItems:'center', gap:12,
      }}>
        <div style={{
          width:34, height:34, borderRadius:9, background:'linear-gradient(135deg, #fff7ed, #ffedd5)',
          display:'flex', alignItems:'center', justifyContent:'center',
          border:'1px solid #fed7aa',
        }}>
          <IconMsg size={14} stroke="#ff6a13"/>
        </div>
        <div>
          <div style={{ fontWeight:600, fontSize:14, color:'#141414' }}>Assistant Transaction & Juridique</div>
        </div>
      </div>

      {/* Messages */}
      <div style={{ flex:1, padding:'20px 24px', display:'flex', flexDirection:'column', gap:12, overflowY:'auto', overflow:'hidden' }}>
        <Msg delay={300} started={started} bg="#f3f4f6" border="1px solid #e5e7eb" maxWidth={380}>
          Bonjour ! Je peux vous aider à rechercher dans vos documents PDF indexés. Posez-moi une question sur vos documents.
        </Msg>
        <TimeStamp delay={400} started={started}>16:56</TimeStamp>

        <Msg delay={1400} started={started} align="right" bg="#141414" color="#fff" border="none" maxWidth={360}>
          Quelle est la durée initiale du contrat Verdi et est-il renouvelable ?
        </Msg>
        <TimeStamp delay={1500} started={started}>16:57</TimeStamp>

        <Dots started={started} delay={2400}/>

        <Msg delay={3900} started={started} bg="#f3f4f6" border="1px solid #e5e7eb" maxWidth={420}>
          <span>D'après le document <strong>"Contrat Verdi.pdf"</strong> (article 2, page 10), la durée initiale du contrat est de{' '}
          <span style={{ background:'#fef08a', padding:'1px 5px', borderRadius:3, fontWeight:500 }}>trois (3) ans</span>.{' '}
          Il pourra être renouvelé par accord exprès et écrit des Parties.</span>
          <div style={{
            marginTop:10, paddingTop:10, borderTop:'1px solid #e5e7eb',
            display:'flex', alignItems:'center', gap:5, fontSize:11.5, color:'#6b7280',
            cursor:'pointer',
          }}>
            <IconExtLink size={12} stroke="#ff6a13"/>
            <span style={{ color:'#ff6a13' }}>Ouvrir Contrat_Verdi.pdf (page 10)</span>
          </div>
        </Msg>
        <TimeStamp delay={4000} started={started}>16:57</TimeStamp>
      </div>

      {/* Input */}
      <div style={{ padding:'16px 24px', borderTop:'1px solid #e5e7eb', background:'#fff' }}>
        <div style={{ display:'flex', gap:10, alignItems:'center' }}>
          <div style={{
            flex:1, background:'#f9fafb', border:'1px solid #e5e7eb',
            borderRadius:10, padding:'12px 16px', fontSize:13, color:'#9ca3af',
            display:'flex', alignItems:'center', justifyContent:'space-between',
          }}>
            <span>Posez une question sur vos documents…</span>
            <IconPaperclip size={14} stroke="#9ca3af"/>
          </div>
          <div style={{
            width:40, height:40, borderRadius:10, background:'#ff6a13',
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow:'0 0 12px rgba(255,106,19,0.3)', cursor:'pointer',
          }}>
            <IconSend size={15} stroke="#fff"/>
          </div>
        </div>
        <div style={{ fontSize:11, color:'#9ca3af', marginTop:8 }}>
          Appuyez sur Entrée pour envoyer, Maj+Entrée pour une nouvelle ligne
        </div>
      </div>
    </div>
  );
}

/* ─── Timestamp ─── */
function TimeStamp({ children, delay, started }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    if (!started) return;
    const t = setTimeout(() => setShow(true), delay);
    return () => clearTimeout(t);
  }, [started, delay]);
  return (
    <div style={{
      fontSize:10.5, color:'#9ca3af', fontFamily:'JetBrains Mono, monospace',
      opacity: show ? 1 : 0, transition:'opacity 0.3s',
    }}>{children}</div>
  );
}

/* ============================================================
   VARIATION 1 — Chat + PDF (sans sidebar) — épuré

/* ─── Canvas ─── */
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
